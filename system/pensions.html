<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pensions_head_title">פנסיונט | חפש פנסיון לכלב שלך</title>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pensionet.vercel.app/system/pensions.html">
    <meta property="og:title" content="פנסיונט | חפש פנסיון לכלב שלך">
    <meta property="og:description" content="מצא את הפנסיון המושלם לכלב שלך. חיפוש לפי מיקום, קרבה וסוג פנסיון.">
    <meta property="og:image" content="https://pensionet.vercel.app/system/images/logo_share.png">
    <meta property="og:image:width" content="3000">
    <meta property="og:image:height" content="3000">
    <meta property="og:image:alt" content="פנסיונט – תוכנה לניהול פנסיון כלבים">
    <meta property="og:locale" content="he_IL">
    <meta property="og:site_name" content="פנסיונט">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="פנסיונט | חפש פנסיון לכלב שלך">
    <meta name="twitter:description" content="מצא את הפנסיון המושלם לכלב שלך. חיפוש לפי מיקום, קרבה וסוג פנסיון.">
    <meta name="twitter:image" content="https://pensionet.vercel.app/system/images/logo_share.png">
    <meta name="twitter:image:alt" content="פנסיונט – תוכנה לניהול פנסיון כלבים">
    
    <!-- Meta Tags for SEO -->
    <meta name="description" content="מצא את הפנסיון המושלם לכלב שלך. חיפוש לפי מיקום, קרבה וסוג פנסיון.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/pensions.css">
    
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body class="pensions-page">
    <div class="app-container">
        <!-- Sidebar: List and Filters -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <a href="../website/index.html" class="logo-wrapper" style="text-decoration: none;">
                    <div class="pensionet-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 18C14.2091 18 16 16.2091 16 14C16 11.7909 14.2091 10 12 10C9.79086 10 8 11.7909 8 14C8 16.2091 9.79086 18 12 18Z" />
                            <circle cx="7.5" cy="7" r="2" />
                            <circle cx="12" cy="5" r="2" />
                            <circle cx="16.5" cy="7" r="2" />
                        </svg>
                    </div>
                    <h1 class="logo-text" data-i18n="pensionet_logo">פנסיונט</h1>
                </a>
                <div class="search-box">
                    <input type="text" id="pensionSearch" data-i18n="pensions_search_placeholder" placeholder="חפש פנסיון או עיר...">
                    <i class="fas fa-search"></i>
                </div>
                <div class="filters">
                    <button id="sortByDistance" class="filter-btn active" data-i18n="filter_nearby">
                        <i class="fas fa-location-arrow"></i> הקרובים אלי
                    </button>
                    <button id="sortByPrice" class="filter-btn" data-i18n="filter_price">
                        <i class="fas fa-shekel-sign"></i> לפי מחיר
                    </button>
                </div>
            </header>
            
            <div id="pensionList" class="pension-list">
                <!-- List items will be injected here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p data-i18n="loading_pensions">מחפש פנסיונים באזורך...</p>
                </div>
            </div>
            
            <footer class="sidebar-footer">
                <div class="credit-badge">
                    <span data-i18n="btn_switch_to_mgmt">עבור לניהול פנסיון</span>
                    <a href="../website/index.html" data-i18n="pensionet_logo">פנסיונט</a>
                </div>
            </footer>
        </aside>

        <!-- Main Content: Map -->
        <main class="map-container">
            <div id="map"></div>
            
            <!-- Floating Navigation (Visible on Mobile) -->
            <button id="toggleMobileView" class="mobile-toggle-btn" data-i18n="mobile_show_list">
                <i class="fas fa-list"></i> הצג רשימה
            </button>

            <!-- User Location Indicator -->
            <div id="locationStatus" class="location-toast" style="display: none;" data-i18n="locating_user">
                <i class="fas fa-compass fa-spin"></i> מאתר מיקום...
            </div>

            <!-- Admin Access -->
            <div class="admin-access-btn" id="adminLoginTrigger">
                <i class="fas fa-user-shield"></i>
            </div>
        </main>
    </div>

    <!-- Admin Password Modal -->
    <div id="adminModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 data-i18n="admin_login_title">כניסת מנהל</h3>
            <p data-i18n="admin_login_desc">הזן סיסמה לניהול תצוגת פנסיונים</p>
            <input type="password" id="adminPassword" placeholder="סיסמה...">
            <div class="modal-actions">
                <button onclick="closeAdminModal()" class="btn-secondary" data-i18n="btn_cancel">ביטול</button>
                <button onclick="checkAdminPassword()" class="btn-primary" data-i18n="tab_settings">כניסה</button>
            </div>
        </div>
    </div>

    <!-- Admin Confirm Logout Modal -->
    <div id="confirmModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 data-i18n="admin_logout_title">יציאה ממצב מנהל</h3>
            <p data-i18n="admin_logout_desc">האם אתה בטוח שברצונך לצאת? הצ'קבוקסים לניהול יוסתרו.</p>
            <div class="modal-actions">
                <button onclick="closeConfirmModal()" class="btn-secondary" data-i18n="btn_cancel">ביטול</button>
                <button onclick="logoutAdmin()" class="btn-primary" style="background: #ef4444; border: none;" data-i18n="header_logout">צא עכשיו</button>
            </div>
        </div>
    </div>

    <!-- Admin Save Changes Button -->
    <div id="saveButtonContainer">
        <button id="saveButton" onclick="saveAdminChanges()">
            <i class="fas fa-save"></i> 
            <span data-i18n="btn_save_changes">שמור שינויים</span>
        </button>
    </div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/pensions.js"></script>
</body>
</html>
